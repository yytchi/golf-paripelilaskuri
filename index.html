// ── Firebase bridge ───────────────────────────────────────────────────────────
function subscribeToData(cb) {
  if (window._firebaseReady) {
    return window._firebase.subscribe(cb);
  }
  const handler = () => window._firebase.subscribe(cb);
  window.addEventListener("firebaseReady", handler, { once: true });
  return () => window.removeEventListener("firebaseReady", handler);
}

function saveToFirebase(data) {
  if (window._firebaseReady) return window._firebase.save(data);
  return Promise.resolve();
}

function checkPassword(pw) {
  if (window._firebaseReady) return window._firebase.checkPassword(pw);
  return new Promise(resolve => {
    window.addEventListener("firebaseReady", () => resolve(window._firebase.checkPassword(pw)), { once: true });
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function fmt(d) { if(!d)return""; return new Date(d).toLocaleDateString("fi-FI"); }

function seedForMatch(m) {
  const str=(m.id||"")+(m.date||"")+(m.a1||"")+(m.a2||"")+(m.b1||"")+(m.b2||"")+(m.winner||"");
  let h=0; for(let i=0;i<str.length;i++) h=(h*31+str.charCodeAt(i))|0; return Math.abs(h);
}

function computeStats(players, matches) {
  const stats={};
  for(const p of players) stats[p]={games:0,wins:0,losses:0,debt:0,received:0};
  for(const m of matches) {
    if(!m.winner) continue;
    const winners=m.winner==="A"?[m.a1,m.a2]:[m.b1,m.b2];
    const losers=m.winner==="A"?[m.b1,m.b2]:[m.a1,m.a2];
    for(const p of [...winners,...losers]) if(stats[p]) stats[p].games++;
    for(const p of winners) if(stats[p]) stats[p].wins++;
    for(const p of losers)  if(stats[p]) stats[p].losses++;
    const seed=seedForMatch(m);
    const [l1,l2]=losers, h1=seed%2===0?winners[0]:winners[1], h2=seed%2===0?winners[1]:winners[0];
    if(!m.paidH1&&l1&&h1){if(stats[l1])stats[l1].debt++;if(stats[h1])stats[h1].received++;}
    if(!m.paidH2&&l2&&h2){if(stats[l2])stats[l2].debt++;if(stats[h2])stats[h2].received++;}
  }
  return stats;
}

function rankPlayers(players, stats) {
  return [...players].sort((a,b)=>{
    const sa=stats[a]||{},sb=stats[b]||{};
    if((sb.wins||0)!==(sa.wins||0)) return (sb.wins||0)-(sa.wins||0);
    const pa=sa.games?sa.wins/sa.games:0, pb=sb.games?sb.wins/sb.games:0;
    return pb-pa;
  });
}

function computePartnerStats(player, matches) {
  const p={};
  for(const m of matches){
    if(!m.winner) continue;
    const tA=[m.a1,m.a2],tB=[m.b1,m.b2];
    const mt=tA.includes(player)?"A":tB.includes(player)?"B":null; if(!mt) continue;
    const partner=(mt==="A"?tA:tB).find(x=>x!==player); if(!partner) continue;
    if(!p[partner]) p[partner]={games:0,wins:0};
    p[partner].games++; if(m.winner===mt) p[partner].wins++;
  }
  return p;
}

function computeOpponentStats(player, matches) {
  const o={};
  for(const m of matches){
    if(!m.winner) continue;
    const tA=[m.a1,m.a2],tB=[m.b1,m.b2];
    const mt=tA.includes(player)?"A":tB.includes(player)?"B":null; if(!mt) continue;
    const opps=mt==="A"?tB:tA;
    for(const opp of opps){
      if(!o[opp]) o[opp]={games:0,wins:0};
      o[opp].games++; if(m.winner===mt) o[opp].wins++;
    }
  }
  return o;
}

function computeMonthlyTrend(player, matches) {
  const now=new Date(), months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push({year:d.getFullYear(),month:d.getMonth(),wins:0,games:0,label:d.toLocaleDateString("fi-FI",{month:"short"})});
  }
  for(const m of matches){
    if(!m.winner||!m.date) continue;
    const d=new Date(m.date);
    const idx=months.findIndex(mo=>mo.year===d.getFullYear()&&mo.month===d.getMonth()); if(idx===-1) continue;
    const mt=[m.a1,m.a2].includes(player)?"A":[m.b1,m.b2].includes(player)?"B":null; if(!mt) continue;
    months[idx].games++; if(m.winner===mt) months[idx].wins++;
  }
  return months;
}

// ── Sparkline ─────────────────────────────────────────────────────────────────
function Sparkline({data,width=120,height=36}){
  if(!data||data.every(d=>d.games===0)) return <span style={{color:"var(--text3)",fontSize:12}}>–</span>;
  const vals=data.map(d=>d.games>0?d.wins/d.games:null);
  const defined=vals.filter(v=>v!==null);
  if(defined.length<2) return <span style={{color:"var(--text3)",fontSize:12}}>–</span>;
  const pad=4,w=width-pad*2,h=height-pad*2;
  const points=vals.map((v,i)=>({x:pad+(i/(vals.length-1))*w,y:v===null?null:pad+(1-v)*h,v}));
  let d="";
  points.forEach((p,i)=>{
    if(p.y===null)return;
    const prev=points.slice(0,i).reverse().find(pp=>pp.y!==null);
    d+=prev?` L${p.x},${p.y}`:`M${p.x},${p.y}`;
  });
  const last=points.filter(p=>p.y!==null).pop();
  return(
    <svg width={width} height={height} style={{overflow:"visible"}}>
      <path d={d} fill="none" stroke="var(--green)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      {last&&<circle cx={last.x} cy={last.y} r="3" fill="var(--green)"/>}
      {points.map((p,i)=>p.y!==null&&<circle key={i} cx={p.x} cy={p.y} r="2" fill="var(--bg)" stroke="var(--green)" strokeWidth="1.5"/>)}
    </svg>
  );
}

  .duo-pct{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;width:36px;text-align:right}
  .duo-games{font-size:11px;color:var(--text3);width:32px;text-align:right}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
`;

// ── Login Screen ──────────────────────────────────────────────────────────────
function LoginScreen({ onSuccess }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  async function handleLogin() {
    if (!pw.trim()) { setErr("Syötä salasana"); return; }
    setLoading(true);
    const ok = await checkPassword(pw.trim());
    setLoading(false);
    if (ok) {
      sessionStorage.setItem(SESSION_KEY, "1");
      onSuccess();
    } else {
      setErr("Väärä salasana");
      setPw("");
    }
  }

  return (
    <>
      <style>{styles}</style>
      <div className="app" style={{justifyContent:"center",alignItems:"center",padding:"0 24px"}}>
        <div style={{width:"100%",maxWidth:340}}>
          <div style={{textAlign:"center",marginBottom:32}}>
            <div style={{fontSize:56,marginBottom:12}}>🍺</div>
            <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:24,letterSpacing:"-0.5px"}}>Golf Paripelilaskuri</div>
            <div style={{color:"var(--text2)",fontSize:14,marginTop:6}}>Syötä salasana jatkaaksesi</div>
          </div>
          <div className="form-group">
            <input
              className="form-input"
              type="password"
              placeholder="Salasana"
              value={pw}
              onChange={e=>{ setPw(e.target.value); setErr(""); }}
              onKeyDown={e=>e.key==="Enter"&&handleLogin()}
              autoFocus
              style={{fontSize:18,textAlign:"center",letterSpacing:2}}
            />
          </div>
          {err && <div style={{color:"var(--red)",fontSize:13,textAlign:"center",marginBottom:10}}>{err}</div>}
          <button className="btn btn-primary" onClick={handleLogin} disabled={loading}>
            {loading ? <><div className="spinner" style={{width:16,height:16,borderWidth:2}}/> Tarkistetaan…</> : "Kirjaudu sisään"}
          </button>
        </div>
      </div>
    </>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("ranking");
  const [data, setDataRaw] = useState(null);
  const [connected, setConnected] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [toast, setToast] = useState(null);
  const [authed, setAuthed] = useState(() => sessionStorage.getItem(SESSION_KEY) === "1");
  const isSaving = useRef(false);

  // Subscribe to Firebase realtime updates – runs when authed becomes true
  useEffect(() => {
    if (!authed) return;
    const unsub = subscribeToData((remoteData) => {
      setConnected(true);
      if (!isSaving.current) {
        setDataRaw(remoteData || { ...DEFAULT_STATE });
      }
    });
    return () => typeof unsub === "function" && unsub();
  }, [authed]);

  const setData = useCallback((updater) => {
    setDataRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      isSaving.current = true;
      setSyncing(true);
      saveToFirebase(next).then(() => {
        setSyncing(false);
        setTimeout(() => { isSaving.current = false; }, 500);
      });
      return next;
    });
  }, []);

  const showToast = useCallback((msg) => {
    setToast(msg); setTimeout(() => setToast(null), 2200);
  }, []);

  if (!authed) return <LoginScreen onSuccess={() => setAuthed(true)} />;

  if (!data || !connected) return (
    <>
      <style>{styles}</style>
      <div className="app">
        <div className="loading">
          <div className="spinner"/>
          <span>🍺 Yhdistetään…</span>
          <span className="loading-sub">Ladataan yhteistä dataa</span>
        </div>
      </div>
    </>
  );

  const stats = computeStats(data.players, data.matches);
  const tabs = [
    {id:"ranking",label:"Ranking",icon:"trophy"},
    {id:"matches",label:"Ottelut",icon:"golf"},
    {id:"beers",label:"Oluet",icon:"beer"},
    {id:"players",label:"Pelaajat",icon:"users"},
  ];

  return (
    <>
      <style>{styles}</style>
      <div className="app">
        <header className="header">
          <span style={{fontSize:22}}>🍺</span>
          <span className="header-title">Golf Paripelilaskuri</span>
          <span style={{fontSize:11,color:syncing?"var(--gold)":"var(--green)",display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:syncing?"var(--gold)":"var(--green)",display:"inline-block",animation:syncing?"pulse 1s infinite":"none"}}/>
            {syncing?"Tallennetaan…":"Live"}
          </span>
        </header>
        <main className="content">
          {tab==="ranking"&&<RankingTab data={data} stats={stats}/>}
          {tab==="matches"&&<MatchesTab data={data} setData={setData} showToast={showToast}/>}
          {tab==="beers"&&<BeersTab data={data} setData={setData} showToast={showToast} stats={stats}/>}
          {tab==="players"&&<PlayersTab data={data} setData={setData} showToast={showToast}/>}
        </main>
        <nav className="nav">
          {tabs.map(t=>(
            <button key={t.id} className={`nav-btn ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>
              <Icon name={t.icon} size={20}/>{t.label}
            </button>
          ))}
        </nav>
        {toast&&<div className="toast" style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",background:"var(--green)",color:"#0d1117",fontWeight:600,fontSize:14,padding:"10px 20px",borderRadius:30,zIndex:200,whiteSpace:"nowrap"}}>{toast}</div>}
      </div>
    </>
  );
}

// ── Ranking Tab ───────────────────────────────────────────────────────────────
function RankingTab({data,stats}){
  const [sel,setSel]=useState(null);
  if(sel) return <PlayerProfile player={sel} data={data} stats={stats} onBack={()=>setSel(null)}/>;
  const ranked=rankPlayers(data.players,stats);
  const totalMatches=data.matches.filter(m=>m.winner).length;
  const unpaid=data.matches.reduce((a,m)=>{if(!m.winner)return a;if(!m.paidH1)a++;if(!m.paidH2)a++;return a;},0);
  const allTime={};
  for(const p of data.players) allTime[p]={debt:0,received:0};
  for(const m of data.matches){
    if(!m.winner) continue;
    const w=m.winner==="A"?[m.a1,m.a2]:[m.b1,m.b2],l=m.winner==="A"?[m.b1,m.b2]:[m.a1,m.a2];
    const s=seedForMatch(m),h1=s%2===0?w[0]:w[1],h2=s%2===0?w[1]:w[0];
    if(l[0]&&allTime[l[0]])allTime[l[0]].debt++;if(h1&&allTime[h1])allTime[h1].received++;
    if(l[1]&&allTime[l[1]])allTime[l[1]].debt++;if(h2&&allTime[h2])allTime[h2].received++;
  }
  if(data.players.length===0) return <div><div className="section-head">Ranking</div><div className="empty"><div className="empty-icon"><Icon name="trophy" size={40}/></div><div className="empty-text">Lisää pelaajia Pelaajat-välilehdeltä</div></div></div>;
  return(
    <div>
      <div className="section-head">Ranking</div>
      <div className="stat-grid">
        <div className="stat-box"><div className="stat-val gold">{data.players.length}</div><div className="stat-lbl">Pelaajaa</div></div>
        <div className="stat-box"><div className="stat-val">{totalMatches}</div><div className="stat-lbl">Ottelua</div></div>
        <div className="stat-box"><div className="stat-val red">{unpaid}</div><div className="stat-lbl">Maksamatta</div></div>
      </div>
      <div className="card">
        <div className="card-title">Kauden sijoitukset · klikkaa profiiliin</div>
        {ranked.map((p,i)=>{
          const s=stats[p]||{},pct=s.games?Math.round(s.wins/s.games*100):0;
          const trend=computeMonthlyTrend(p,data.matches);
          return(
            <div key={p} className="rank-item clickable" onClick={()=>setSel(p)}>
              <div className="rank-num">{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
              <div style={{flex:1}}><div className="rank-name">{p}</div><div className="rank-stats">{s.wins||0}V – {s.losses||0}H · {s.games||0} peliä</div></div>
              <Sparkline data={trend} width={60} height={28}/>
              <div className="rank-winpct" style={{marginLeft:8}}>{s.games?pct+"%":"–"}</div>
            </div>
          );
        })}
      </div>
      <div className="card">
        <div className="card-title">Olutvelat – historiakooste</div>
        {[...data.players].sort((a,b)=>(allTime[b]?.debt||0)-(allTime[a]?.debt||0)).slice(0,5).map(p=>{
          const s=allTime[p]||{},net=(s.received||0)-(s.debt||0);
          return(
            <div key={p} className="rank-item clickable" onClick={()=>setSel(p)}>
              <div className="rank-name" style={{flex:1}}>{p}</div>
              <span className="tag tag-red">-{s.debt||0} 🍺</span>
              <span style={{marginLeft:6,fontSize:13,fontWeight:600}} className={net>=0?"net-pos":"net-neg"}>{net>=0?"+":""}{net}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Player Profile ────────────────────────────────────────────────────────────
function PlayerProfile({player,data,stats,onBack}){
  const s=stats[player]||{},pct=s.games?Math.round(s.wins/s.games*100):0;
  const ranked=rankPlayers(data.players,stats),rank=ranked.indexOf(player)+1;
  const trend=computeMonthlyTrend(player,data.matches);
  const partnerStats=computePartnerStats(player,data.matches);
  const oppStats=computeOpponentStats(player,data.matches);
  const partners=Object.entries(partnerStats).filter(([,v])=>v.games>0).sort((a,b)=>(b[1].wins/b[1].games)-(a[1].wins/a[1].games));
  const opponents=Object.entries(oppStats).filter(([,v])=>v.games>0).sort((a,b)=>(b[1].wins/b[1].games)-(a[1].wins/a[1].games));
  const myMatches=data.matches.filter(m=>m.winner&&[m.a1,m.a2,m.b1,m.b2].includes(player)).sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,5);
  return(
    <div>
      <button onClick={onBack} style={{background:"none",border:"none",color:"var(--text2)",cursor:"pointer",display:"flex",alignItems:"center",gap:6,marginBottom:14,fontSize:14}}>
        <Icon name="back" size={18}/> Takaisin rankingiin
      </button>
      <div className="profile-hero">
        <div className="profile-avatar">{player.charAt(0).toUpperCase()}</div>
        <div><div className="profile-name">{player}</div><div className="profile-rank">Sija {rank} · {s.wins||0}V {s.losses||0}H</div></div>
        <div style={{marginLeft:"auto",textAlign:"right"}}>
          <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:28,color:pct>=50?"var(--green)":"var(--red)"}}>{s.games?pct+"%":"–"}</div>
          <div style={{fontSize:11,color:"var(--text2)"}}>voitto-%</div>
        </div>
      </div>
      <div className="stat-grid">
        <div className="stat-box"><div className="stat-val">{s.games||0}</div><div className="stat-lbl">Pelit</div></div>
        <div className="stat-box"><div className="stat-val green">{s.wins||0}</div><div className="stat-lbl">Voitot</div></div>
        <div className="stat-box"><div className="stat-val red">{s.losses||0}</div><div className="stat-lbl">Häviöt</div></div>
      </div>
      <div className="card">
        <div className="card-title">Kuukausitrendit (voitto-%)</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",gap:4}}>
          {trend.map((mo,i)=>{
            const pm=mo.games>0?mo.wins/mo.games:null,bH=pm!==null?Math.max(4,Math.round(pm*56)):4,has=mo.games>0;
            return(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                {has&&<div style={{fontSize:10,color:"var(--text2)",fontWeight:600}}>{mo.wins}/{mo.games}</div>}
                <div style={{width:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:60}}>
                  <div style={{width:"70%",height:bH,background:!has?"var(--surface2)":pm>=0.5?"var(--green)":"var(--red)",borderRadius:3,opacity:has?1:0.3}}/>
                </div>
                <div style={{fontSize:9,color:"var(--text3)",textTransform:"uppercase"}}>{mo.label}</div>
              </div>
            );
          })}
        </div>
      </div>
      {partners.length>0&&(
        <div className="card">
          <div className="card-title">Paritilastot</div>
          <div className="duo-table">
            {partners.map(([pt,v])=>{
              const p=v.games>0?Math.round(v.wins/v.games*100):0;
              return <div key={pt} className="duo-row"><div className="duo-name">{pt}</div><div className="duo-bar-wrap"><div className="duo-bar" style={{width:p+"%"}}/></div><div className="duo-pct" style={{color:p>=50?"var(--green)":"var(--red)"}}>{p}%</div><div className="duo-games">{v.wins}V/{v.games}</div></div>;
            })}
          </div>
        </div>
      )}
      {opponents.length>0&&(
        <div className="card">
          <div className="card-title">Vastustajatilastot</div>
          <div className="duo-table">
            {opponents.map(([opp,v])=>{
              const p=v.games>0?Math.round(v.wins/v.games*100):0;
              return <div key={opp} className="duo-row"><div className="duo-name">{opp}</div><div className="duo-bar-wrap"><div className={`duo-bar ${p<50?"red":""}`} style={{width:p+"%"}}/></div><div className="duo-pct" style={{color:p>=50?"var(--green)":"var(--red)"}}>{p}%</div><div className="duo-games">{v.wins}V/{v.games}</div></div>;
            })}
          </div>
        </div>
      )}
      {myMatches.length>0&&(
        <div className="card">
          <div className="card-title">Viimeiset ottelut</div>
          {myMatches.map(m=>{
            const mt=[m.a1,m.a2].includes(player)?"A":"B",won=m.winner===mt;
            const partner=(mt==="A"?[m.a1,m.a2]:[m.b1,m.b2]).find(p=>p!==player);
            const opps=(mt==="A"?[m.b1,m.b2]:[m.a1,m.a2]).join(" & ");
            return(
              <div key={m.id} className="duo-row">
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}><span style={{color:"var(--text2)"}}>& {partner}</span> vs {opps}</div><div style={{fontSize:11,color:"var(--text3)"}}>{fmt(m.date)}</div></div>
                <span className={`tag ${won?"tag-green":"tag-red"}`}>{won?"Voitto":"Häviö"}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Match Form ────────────────────────────────────────────────────────────────
function MatchForm({initial,pOpts,onSave,onCancel,title}){
  const [form,setForm]=useState(initial);
  const [err,setErr]=useState("");
  const sel=(f,v)=>setForm(p=>({...p,[f]:v}));
  function submit(){
    if(!form.a1||!form.a2||!form.b1||!form.b2){setErr("Valitse kaikki pelaajat");return;}
    if(!form.winner){setErr("Valitse voittajapari");return;}
    if(new Set([form.a1,form.a2,form.b1,form.b2]).size<4){setErr("Sama pelaaja ei voi olla kahdessa parissa");return;}
    onSave(form);
  }
  return(
    <div className="card" style={{marginBottom:16}}>
      <div className="card-title">{title}</div>
      <div className="form-group"><label className="form-label">Päivämäärä</label><input className="form-input" type="date" value={form.date} onChange={e=>sel("date",e.target.value)}/></div>
      <div className="form-group"><label className="form-label">Pari A</label><div className="form-grid-2">
        <select className="form-input form-select" value={form.a1} onChange={e=>sel("a1",e.target.value)}><option value="">Pelaaja 1</option>{pOpts.map(p=><option key={p} value={p}>{p}</option>)}</select>
        <select className="form-input form-select" value={form.a2} onChange={e=>sel("a2",e.target.value)}><option value="">Pelaaja 2</option>{pOpts.map(p=><option key={p} value={p}>{p}</option>)}</select>
      </div></div>
      <div className="form-group"><label className="form-label">Pari B</label><div className="form-grid-2">
        <select className="form-input form-select" value={form.b1} onChange={e=>sel("b1",e.target.value)}><option value="">Pelaaja 1</option>{pOpts.map(p=><option key={p} value={p}>{p}</option>)}</select>
        <select className="form-input form-select" value={form.b2} onChange={e=>sel("b2",e.target.value)}><option value="">Pelaaja 2</option>{pOpts.map(p=><option key={p} value={p}>{p}</option>)}</select>
      </div></div>
      <div className="form-group"><label className="form-label">Voittaja</label>
        <div className="winner-toggle">
          <div className={`winner-opt A ${form.winner==="A"?"selected":""}`} onClick={()=>sel("winner","A")}>Pari A voitti{form.a1&&form.a2?<><br/><small>{form.a1} & {form.a2}</small></>:""}</div>
          <div className={`winner-opt B ${form.winner==="B"?"selected":""}`} onClick={()=>sel("winner","B")}>Pari B voitti{form.b1&&form.b2?<><br/><small>{form.b1} & {form.b2}</small></>:""}</div>
        </div>
      </div>
      {err&&<div style={{color:"var(--red)",fontSize:13,marginBottom:10}}>{err}</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <button className="btn btn-secondary" onClick={onCancel}><Icon name="x" size={15}/> Peruuta</button>
        <button className="btn btn-primary" onClick={submit} disabled={pOpts.length<4}><Icon name="check" size={15}/> Tallenna</button>
      </div>
      {pOpts.length<4&&<div style={{color:"var(--text2)",fontSize:12,marginTop:8,textAlign:"center"}}>Lisää vähintään 4 pelaajaa ensin</div>}
    </div>
  );
}

// ── Matches Tab ───────────────────────────────────────────────────────────────
function MatchesTab({data,setData,showToast}){
  const [showAdd,setShowAdd]=useState(false);
  const [editId,setEditId]=useState(null);
  const pOpts=data.players;
  const emptyForm={date:new Date().toISOString().slice(0,10),a1:"",a2:"",b1:"",b2:"",winner:""};
  function addMatch(form){setData(d=>({...d,matches:[{id:uid(),...form},...d.matches]}));setShowAdd(false);showToast("Ottelu lisätty ✓");}
  function saveEdit(form){setData(d=>({...d,matches:d.matches.map(m=>m.id===editId?{...m,...form}:m)}));setEditId(null);showToast("Ottelu päivitetty ✓");}
  function deleteMatch(id){setData(d=>({...d,matches:d.matches.filter(m=>m.id!==id)}));showToast("Ottelu poistettu");}
  function getBeerInfo(m){
    if(!m.winner)return null;
    const w=m.winner==="A"?[m.a1,m.a2]:[m.b1,m.b2],l=m.winner==="A"?[m.b1,m.b2]:[m.a1,m.a2],s=seedForMatch(m);
    return{loser1:l[0],loser2:l[1],h1pays:s%2===0?w[0]:w[1],h2pays:s%2===0?w[1]:w[0]};
  }
  function togglePaid(id,field){setData(d=>({...d,matches:d.matches.map(m=>m.id===id?{...m,[field]:!m[field]}:m)}));}
  const sorted=[...data.matches].sort((a,b)=>{if(!a.date&&!b.date)return 0;if(!a.date)return 1;if(!b.date)return -1;return b.date.localeCompare(a.date);});
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div className="section-head" style={{marginBottom:0}}>Ottelut</div>
        <button className="btn btn-primary" style={{width:"auto",padding:"8px 14px",fontSize:13}} onClick={()=>{setShowAdd(s=>!s);setEditId(null);}}>
          <Icon name={showAdd?"x":"plus"} size={16}/>{showAdd?"Peruuta":"Lisää"}
        </button>
      </div>
      {showAdd&&<MatchForm initial={emptyForm} pOpts={pOpts} title="Uusi ottelu" onSave={addMatch} onCancel={()=>setShowAdd(false)}/>}
      {sorted.length===0?<div className="empty"><div className="empty-icon"><Icon name="golf" size={40}/></div><div className="empty-text">Ei otteluja vielä</div></div>:
        sorted.map(m=>{
          const beer=getBeerInfo(m),wA=m.winner==="A",isEdit=editId===m.id;
          if(isEdit) return <MatchForm key={m.id} initial={{date:m.date,a1:m.a1,a2:m.a2,b1:m.b1,b2:m.b2,winner:m.winner}} pOpts={pOpts} title="Muokkaa ottelua" onSave={saveEdit} onCancel={()=>setEditId(null)}/>;
          return(
            <div key={m.id} className="match-item">
              <div className="match-header">
                <span className="match-date">{fmt(m.date)}</span>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {m.winner&&<span className={`match-winner-badge ${m.winner}`}>Pari {m.winner} voitti</span>}
                  <button style={{background:"none",border:"none",color:"var(--blue)",cursor:"pointer",padding:2}} onClick={()=>{setEditId(m.id);setShowAdd(false);}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  </button>
                  <button style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",padding:2}} onClick={()=>deleteMatch(m.id)}><Icon name="trash" size={14}/></button>
                </div>
              </div>
              <div className="match-teams">
                <div className={`match-team ${wA?"winner":""}`}><div className="match-team-label">Pari A</div><div className="match-team-names">{m.a1}<br/>{m.a2}</div></div>
                <div className="match-vs">VS</div>
                <div className={`match-team ${!wA&&m.winner?"winner":""}`}><div className="match-team-label">Pari B</div><div className="match-team-names">{m.b1}<br/>{m.b2}</div></div>
              </div>
              {beer&&(
                <div className="match-beer">
                  <div className="beer-row"><div className="beer-text"><strong>{beer.loser1}</strong> → {beer.h1pays}</div><button className={`beer-btn ${m.paidH1?"paid":""}`} onClick={()=>togglePaid(m.id,"paidH1")}><Icon name={m.paidH1?"check":"beer"} size={14}/></button></div>
                  <div className="beer-row"><div className="beer-text"><strong>{beer.loser2}</strong> → {beer.h2pays}</div><button className={`beer-btn ${m.paidH2?"paid":""}`} onClick={()=>togglePaid(m.id,"paidH2")}><Icon name={m.paidH2?"check":"beer"} size={14}/></button></div>
                </div>
              )}
            </div>
          );
        })
      }
    </div>
  );
}

// ── Beers Tab ─────────────────────────────────────────────────────────────────
function BeersTab({data,setData,showToast,stats}){
  function getBeer(m){
    if(!m.winner)return null;
    const w=m.winner==="A"?[m.a1,m.a2]:[m.b1,m.b2],l=m.winner==="A"?[m.b1,m.b2]:[m.a1,m.a2],s=seedForMatch(m);
    return{loser1:l[0],loser2:l[1],h1pays:s%2===0?w[0]:w[1],h2pays:s%2===0?w[1]:w[0]};
  }
  function markAllPaid(name){
    setData(d=>({...d,matches:d.matches.map(m=>{const b=getBeer(m);if(!b)return m;let u={...m};if(b.loser1===name&&!m.paidH1)u.paidH1=true;if(b.loser2===name&&!m.paidH2)u.paidH2=true;return u;})}));
    showToast(`${name} merkitty maksetuksi ✓`);
  }
  const sorted=[...data.players].sort((a,b)=>(stats[b]?.debt||0)-(stats[a]?.debt||0));
  return(
    <div>
      <div className="section-head">Olutvelat</div>
      <p className="section-sub">Maksamattomat oluet kaudelta</p>
      {data.players.length===0?<div className="empty"><div className="empty-icon"><Icon name="beer" size={40}/></div><div className="empty-text">Ei pelaajia</div></div>:(
        <div className="card">
          <table className="beer-table">
            <thead><tr><th>Pelaaja</th><th style={{textAlign:"center"}}>Velkaa</th><th style={{textAlign:"center"}}>Saanut</th><th style={{textAlign:"center"}}>Netto</th><th></th></tr></thead>
            <tbody>
              {sorted.map(p=>{
                const s=stats[p]||{},debt=s.debt||0,recv=s.received||0,net=recv-debt;
                return(
                  <tr key={p}>
                    <td style={{fontWeight:500}}>{p}</td>
                    <td style={{textAlign:"center"}}>{debt>0?<span className="debt-badge">-{debt} 🍺</span>:<span style={{color:"var(--text3)"}}>–</span>}</td>
                    <td style={{textAlign:"center"}}>{recv>0?<span className="recv-badge">+{recv} 🍺</span>:<span style={{color:"var(--text3)"}}>–</span>}</td>
                    <td style={{textAlign:"center"}} className={net>0?"net-pos":net<0?"net-neg":""}>{net===0?"–":(net>0?"+":"")+net}</td>
                    <td>{debt>0&&<button className="btn btn-secondary" style={{width:"auto",padding:"4px 10px",fontSize:12}} onClick={()=>markAllPaid(p)}><Icon name="check" size={12}/> Maksettu</button>}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
      {data.matches.filter(m=>m.winner&&(!m.paidH1||!m.paidH2)).length>0&&(
        <div>
          <div className="card-title" style={{padding:"8px 0"}}>Maksamattomat ottelut</div>
          {data.matches.filter(m=>m.winner&&(!m.paidH1||!m.paidH2)).map(m=>{
            const b=getBeer(m);if(!b)return null;
            return(
              <div key={m.id} className="match-item">
                <div className="match-date" style={{marginBottom:8}}>{fmt(m.date)} · Pari {m.winner} voitti</div>
                <div className="match-beer" style={{marginTop:0,paddingTop:0,borderTop:"none"}}>
                  {!m.paidH1&&<div className="beer-row"><div className="beer-text"><strong>{b.loser1}</strong> → {b.h1pays}</div><button className="beer-btn" onClick={()=>setData(d=>({...d,matches:d.matches.map(x=>x.id===m.id?{...x,paidH1:true}:x)}))}><Icon name="check" size={14}/></button></div>}
                  {!m.paidH2&&<div className="beer-row"><div className="beer-text"><strong>{b.loser2}</strong> → {b.h2pays}</div><button className="beer-btn" onClick={()=>setData(d=>({...d,matches:d.matches.map(x=>x.id===m.id?{...x,paidH2:true}:x)}))}><Icon name="check" size={14}/></button></div>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Players Tab ───────────────────────────────────────────────────────────────
function PlayersTab({data,setData,showToast}){
  const [name,setName]=useState(""),[ err,setErr]=useState("");
  function addPlayer(){
    const n=name.trim();
    if(!n){setErr("Syötä nimi");return;}
    if(data.players.includes(n)){setErr("Pelaaja on jo listalla");return;}
    if(data.players.length>=10){setErr("Maksimi 10 pelaajaa");return;}
    setData(d=>({...d,players:[...d.players,n]}));setName("");setErr("");showToast(`${n} lisätty ✓`);
  }
  function removePlayer(p){
    if(data.matches.some(m=>[m.a1,m.a2,m.b1,m.b2].includes(p))){showToast("Poista ensin pelaajan ottelut");return;}
    setData(d=>({...d,players:d.players.filter(x=>x!==p)}));showToast(`${p} poistettu`);
  }
  return(
    <div>
      <div className="section-head">Pelaajat</div>
      <div className="card">
        <div className="card-title">Lisää pelaaja ({data.players.length}/10)</div>
        <div style={{display:"flex",gap:8}}>
          <input className="form-input" placeholder="Nimi..." value={name} onChange={e=>{setName(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&addPlayer()} maxLength={30}/>
          <button className="btn btn-primary" style={{width:"auto",padding:"10px 16px"}} onClick={addPlayer} disabled={data.players.length>=10}><Icon name="plus" size={18}/></button>
        </div>
        {err&&<div style={{color:"var(--red)",fontSize:13,marginTop:8}}>{err}</div>}
      </div>
      {data.players.length===0?<div className="empty"><div className="empty-icon"><Icon name="users" size={40}/></div><div className="empty-text">Ei pelaajia vielä</div></div>:(
        <div className="card">
          <div className="card-title">Pelaajat</div>
          {data.players.map(p=>(
            <div key={p} className="player-chip">
              <span className="player-chip-name">{p}</span>
              <button className="player-chip-del" onClick={()=>removePlayer(p)}><Icon name="x" size={16}/></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
