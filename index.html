// ── FB helper ─────────────────────────────────────────────────────────────────
function fb() {
  if(window._fbReady) return Promise.resolve(window._fb);
  return new Promise(r=>window.addEventListener("fbReady",()=>r(window._fb),{once:true}));
}

// ── Constants ─────────────────────────────────────────────────────────────────
const SESSION_KEY = "golf-auth-v1";
const DEFAULT = {players:[],matches:[]};

// Firebase stores arrays as objects when items are added – normalize back to arrays
function normalize(d){
  if(!d) return {players:[],matches:[]};
  const players=Array.isArray(d.players)?d.players:d.players?Object.values(d.players):[];
  const matches=Array.isArray(d.matches)?d.matches:d.matches?Object.values(d.matches):[];
  return {players, matches};
}

// ── Pure helpers ──────────────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function fmt(d){ return d?new Date(d).toLocaleDateString("fi-FI"):""; }
function seed(m){
  const s=(m.id||"")+(m.date||"")+(m.a1||"")+(m.a2||"")+(m.b1||"")+(m.b2||"")+(m.winner||"");
  let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))|0; return Math.abs(h);
}
function beerInfo(m){
  if(!m.winner) return null;
  const w=m.winner==="A"?[m.a1,m.a2]:[m.b1,m.b2], l=m.winner==="A"?[m.b1,m.b2]:[m.a1,m.a2], s2=seed(m);
  return{loser1:l[0],loser2:l[1],h1:s2%2===0?w[0]:w[1],h2:s2%2===0?w[1]:w[0]};
}
function computeStats(players,matches){
  const st={};
  for(const p of players) st[p]={games:0,wins:0,losses:0,debt:0,received:0};
  for(const m of matches){
    if(!m.winner) continue;
    const w=m.winner==="A"?[m.a1,m.a2]:[m.b1,m.b2], l=m.winner==="A"?[m.b1,m.b2]:[m.a1,m.a2];
    for(const p of [...w,...l]) if(st[p]) st[p].games++;
    for(const p of w) if(st[p]) st[p].wins++;
    for(const p of l) if(st[p]) st[p].losses++;
    const b=beerInfo(m);
    if(b){
      if(!m.paidH1&&b.loser1&&b.h1){if(st[b.loser1])st[b.loser1].debt++;if(st[b.h1])st[b.h1].received++;}
      if(!m.paidH2&&b.loser2&&b.h2){if(st[b.loser2])st[b.loser2].debt++;if(st[b.h2])st[b.h2].received++;}
    }
  }
  return st;
}
function rankPlayers(players,stats){
  return [...players].sort((a,b)=>{
    const sa=stats[a]||{},sb=stats[b]||{};
    if((sb.wins||0)!==(sa.wins||0)) return (sb.wins||0)-(sa.wins||0);
    return (sb.games?sb.wins/sb.games:0)-(sa.games?sa.wins/sa.games:0);
  });
}
function partnerStats(player,matches){
  const p={};
  for(const m of matches){
    if(!m.winner) continue;
    const tA=[m.a1,m.a2],tB=[m.b1,m.b2];
    const mt=tA.includes(player)?"A":tB.includes(player)?"B":null; if(!mt) continue;
    const partner=(mt==="A"?tA:tB).find(x=>x!==player); if(!partner) continue;
    if(!p[partner]) p[partner]={games:0,wins:0};
    p[partner].games++; if(m.winner===mt) p[partner].wins++;
  } return p;
}
function oppStats(player,matches){
  const o={};
  for(const m of matches){
    if(!m.winner) continue;
    const tA=[m.a1,m.a2],tB=[m.b1,m.b2];
    const mt=tA.includes(player)?"A":tB.includes(player)?"B":null; if(!mt) continue;
    for(const opp of (mt==="A"?tB:tA)){
      if(!o[opp]) o[opp]={games:0,wins:0};
      o[opp].games++; if(m.winner===mt) o[opp].wins++;
    }
  } return o;
}
function monthlyTrend(player,matches){
  const now=new Date(), months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push({year:d.getFullYear(),month:d.getMonth(),wins:0,games:0,label:d.toLocaleDateString("fi-FI",{month:"short"})});
  }
  for(const m of matches){
    if(!m.winner||!m.date) continue;
    const d=new Date(m.date);
    const idx=months.findIndex(mo=>mo.year===d.getFullYear()&&mo.month===d.getMonth()); if(idx===-1) continue;
    const mt=[m.a1,m.a2].includes(player)?"A":[m.b1,m.b2].includes(player)?"B":null; if(!mt) continue;
    months[idx].games++; if(m.winner===mt) months[idx].wins++;
  } return months;
}

// ── Sparkline ─────────────────────────────────────────────────────────────────
function Sparkline({data,width=60,height=28}){
  if(!data||data.every(d=>d.games===0)) return null;
  const vals=data.map(d=>d.games>0?d.wins/d.games:null);
  if(vals.filter(v=>v!==null).length<2) return null;
  const pad=3,w=width-pad*2,h=height-pad*2;
  const pts=vals.map((v,i)=>({x:pad+(i/(vals.length-1))*w,y:v===null?null:pad+(1-v)*h}));
  let d=""; pts.forEach((p,i)=>{if(p.y===null)return;const pr=pts.slice(0,i).reverse().find(pp=>pp.y!==null);d+=pr?` L${p.x},${p.y}`:`M${p.x},${p.y}`;});
  const last=pts.filter(p=>p.y!==null).pop();
  return <svg width={width} height={height} style={{overflow:"visible"}}><path d={d} fill="none" stroke="var(--green)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>{last&&<circle cx={last.x} cy={last.y} r="2.5" fill="var(--green)"/>}</svg>;
}

// ── Login ─────────────────────────────────────────────────────────────────────
function Login({onOk}){
  const [pw,setPw]=useState(""), [err,setErr]=useState(""), [busy,setBusy]=useState(false);
  async function go(){
    if(!pw.trim()){setErr("Syötä salasana");return;}
    setBusy(true);
    const api=await fb();
    const ok=await api.checkPw(pw.trim());
    setBusy(false);
    if(ok){sessionStorage.setItem(SESSION_KEY,"1");onOk();}
    else{setErr("Väärä salasana");setPw("");}
  }
  return(
    <div className="lgn">
      <style>{CSS}</style>
      <div style={{width:"100%",maxWidth:320}}>
        <div style={{textAlign:"center",marginBottom:32}}>

          <div style={{color:"var(--t2)",fontSize:14,marginTop:6}}>Syötä salasana jatkaaksesi</div>
        </div>
        <div className="fg">
          <input className="fi" type="password" placeholder="Salasana" value={pw}
            onChange={e=>{setPw(e.target.value);setErr("");}}
            onKeyDown={e=>e.key==="Enter"&&go()}
            style={{fontSize:18,textAlign:"center",letterSpacing:2}} autoFocus/>
        </div>
        {err&&<div style={{color:"var(--re)",fontSize:13,textAlign:"center",marginBottom:10}}>{err}</div>}
        <button className="btn bp" onClick={go} disabled={busy}>
          {busy?<><div className="sp" style={{width:16,height:16,borderWidth:2}}/>Tarkistetaan…</>:"Kirjaudu sisään"}
        </button>
      </div>
    </div>
  );
}

// ── Main ──────────────────────────────────────────────────────────────────────
function App(){
  const [authed,setAuthed]=useState(()=>sessionStorage.getItem(SESSION_KEY)==="1");
  const [data,setDataState]=useState(null);
  const [activeId,setActiveId]=useState(null);
  const [viewId,setViewId]=useState(null);
  const [allIds,setAllIds]=useState([]);
  const [syncing,setSyncing]=useState(false);
  const [toast,setToast]=useState(null);
  const [tab,setTab]=useState("ranking");
  const saving=useRef(false);
  const unsub=useRef(null);
  const bootDone=useRef(false);

  function attachWatcher(id){
    if(unsub.current){unsub.current();unsub.current=null;}
    unsub.current=window._fb.watchSeason(id,nd=>{
      if(!saving.current) setDataState(normalize(nd));
    });
  }

  // Boot when authed
  useEffect(()=>{
    if(!authed||bootDone.current) return;
    bootDone.current=true;
    console.log("Boot starting...");
    (async()=>{
      try{
        // Wait for Firebase
        if(!window._fbReady){
          console.log("Waiting for Firebase...");
          await new Promise(r=>window.addEventListener("fbReady",r,{once:true}));
        }
        console.log("Firebase ready");
        const api=window._fb;

        let id=await api.getActive();
        console.log("Active season:", id);

        if(!id){
          const leg=await api.getLegacy();
          id="2024-talvi";
          console.log("No active season, creating:", id, "legacy data:", leg);
          await api.saveSeason(id,leg||{...DEFAULT});
          await api.setActive(id);
        }

        const keys=await api.getKeys();
        console.log("Season keys:", keys);

        const d=await api.getSeason(id);
        console.log("Season data:", d);

        setActiveId(id);
        setViewId(id);
        setAllIds(keys.length?keys.sort():[id]);
        setDataState(normalize(d));
        attachWatcher(id);
        console.log("Boot complete!");
      } catch(e){
        console.error("Boot error:", e);
      }
    })();
    return ()=>{if(unsub.current){unsub.current();unsub.current=null;}};
  },[authed]);

  // Switch season (only after boot is done)
  const prevViewId=useRef(null);
  useEffect(()=>{
    if(!viewId||!bootDone.current) return;
    if(viewId===prevViewId.current) return;
    prevViewId.current=viewId;
    console.log("Switching to season:", viewId);
    (async()=>{
      try{
        setDataState(null);
        const d=await window._fb.getSeason(viewId);
        setDataState(normalize(d));
        attachWatcher(viewId);
      } catch(e){ console.error("Switch error:", e); }
    })();
  },[viewId]);

  const save=useCallback((updater)=>{
    setDataState(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      saving.current=true; setSyncing(true);
      fb().then(api=>api.saveSeason(viewId,next)).then(()=>{
        setSyncing(false); setTimeout(()=>{saving.current=false;},600);
      });
      return next;
    });
  },[viewId]);

  const toast2=useCallback((m)=>{setToast(m);setTimeout(()=>setToast(null),2200);},[]);

  const newSeason=useCallback(async(id)=>{
    const api=await fb();
    await api.saveSeason(id,{players:data?.players||[],matches:[]});
    await api.setActive(id);
    const keys=await api.getKeys();
    setAllIds(keys.sort());
    setActiveId(id);
    setViewId(id);
    toast2(`Kausi ${id} aloitettu ✓`);
  },[data,toast2]);

  const setActiveSeasonHandler=useCallback(async(id)=>{
    const api=await fb();
    await api.setActive(id);
    setActiveId(id);
    setViewId(id);
    toast2(`Kausi "${id}" asetettu aktiiviseksi ✓`);
  },[toast2]);

  const renameSeason=useCallback(async(oldId,newId)=>{
    const api=await fb();
    // Copy data to new key, delete old key
    const d=await api.getSeason(oldId);
    await api.saveSeason(newId,d||{...DEFAULT});
    await api.deleteSeason(oldId);
    // Update activeSeason pointer if needed
    if(activeId===oldId) await api.setActive(newId);
    const keys=await api.getKeys();
    setAllIds(keys.sort());
    if(activeId===oldId) setActiveId(newId);
    if(viewId===oldId) setViewId(newId);
    toast2(`Kausi nimetty uudelleen: ${newId} ✓`);
  },[activeId,viewId,toast2]);

  if(!authed) return <Login onOk={()=>setAuthed(true)}/>;

  if(!data) return(
    <div className="app"><style>{CSS}</style>
      <div className="ldr"><div className="sp"/>🍺 Ladataan…<span style={{fontSize:13,color:"var(--t3)"}}>Haetaan kauden tietoja</span></div>
    </div>
  );

  const isActive=viewId===activeId;
  const stats=computeStats(data.players,data.matches);
  const TABS=[{id:"ranking",l:"Ranking",i:"trophy"},{id:"matches",l:"Ottelut",i:"golf"},{id:"beers",l:"Oluet",i:"beer"},{id:"players",l:"Pelaajat",i:"users"}];

  return(
    <div className="app"><style>{CSS}</style>
      <div className="hdr">
        <span style={{fontSize:20}}>🍺</span>
        <div style={{flex:1,minWidth:0}}>
          <div className="hdr-ttl">Golf Paripelilaskuri</div>
          <select value={viewId||""} onChange={e=>setViewId(e.target.value)}
            style={{background:"none",border:"none",color:isActive?"var(--gr)":"var(--go)",fontFamily:"DM Sans,sans-serif",fontSize:11,cursor:"pointer",padding:0,outline:"none",maxWidth:180}}>
            {allIds.map(id=><option key={id} value={id} style={{background:"var(--sf)",color:"var(--tx)"}}>{id}{id===activeId?" ★":""}</option>)}
          </select>
        </div>
        <span style={{fontSize:11,color:syncing?"var(--go)":"var(--gr)",display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
          <span style={{width:7,height:7,borderRadius:"50%",background:syncing?"var(--go)":"var(--gr)",display:"inline-block",animation:syncing?"pulse 1s infinite":"none"}}/>
          {syncing?"Tallennetaan…":"Live"}
        </span>
      </div>

      {!isActive&&(
        <div style={{background:"var(--gob)",borderBottom:"1px solid var(--go)",padding:"7px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <span style={{fontSize:12,color:"var(--go)"}}>📂 Arkistokausi: <strong>{viewId}</strong></span>
          <button onClick={()=>setViewId(activeId)} style={{background:"none",border:"1px solid var(--go)",borderRadius:6,color:"var(--go)",fontSize:11,padding:"3px 8px",cursor:"pointer"}}>Aktiiviseen →</button>
        </div>
      )}

      <div className="pg">
        {tab==="ranking"&&<TabRanking data={data} stats={stats} isActive={isActive}/>}
        {tab==="matches"&&<TabMatches data={data} save={isActive?save:null} toast={toast2} readOnly={!isActive}/>}
        {tab==="beers"&&<TabBeers data={data} save={isActive?save:null} stats={stats} readOnly={!isActive}/>}
        {tab==="players"&&<TabPlayers data={data} save={isActive?save:null} toast={toast2} readOnly={!isActive} activeId={activeId} allIds={allIds} onNew={newSeason} onRename={renameSeason} onSetActive={setActiveSeasonHandler}/>}
      </div>

      <nav className="nav">
        {TABS.map(t=><button key={t.id} className={`nb ${tab===t.id?"on":""}`} onClick={()=>setTab(t.id)}><Icon n={t.i} size={20}/>{t.l}</button>)}
      </nav>

      {toast&&<div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",background:"var(--gr)",color:"#0d1117",fontWeight:600,fontSize:14,padding:"10px 20px",borderRadius:30,zIndex:200,whiteSpace:"nowrap"}}>{toast}</div>}
    </div>
  );
}

// ── Tab: Ranking ──────────────────────────────────────────────────────────────
function TabRanking({data,stats}){
  const [sel,setSel]=useState(null);
  if(sel) return <Profile player={sel} data={data} stats={stats} onBack={()=>setSel(null)}/>;
  const ranked=rankPlayers(data.players,stats);
  const totalM=data.matches.filter(m=>m.winner).length;
  const unpaid=data.matches.reduce((a,m)=>{if(!m.winner)return a;if(!m.paidH1)a++;if(!m.paidH2)a++;return a;},0);
  const allTime={};
  for(const p of data.players) allTime[p]={debt:0,received:0};
  for(const m of data.matches){
    if(!m.winner) continue;
    const b=beerInfo(m); if(!b) continue;
    if(b.loser1&&allTime[b.loser1])allTime[b.loser1].debt++;
    if(b.h1&&allTime[b.h1])allTime[b.h1].received++;
    if(b.loser2&&allTime[b.loser2])allTime[b.loser2].debt++;
    if(b.h2&&allTime[b.h2])allTime[b.h2].received++;
  }
  if(!data.players.length) return <div><div className="sh">Ranking</div><div className="emp"><div className="ei"><Icon n="trophy" size={40}/></div>Lisää pelaajia Pelaajat-välilehdeltä</div></div>;
  return(
    <div>
      <div className="sh">Ranking</div>
      <div className="sg">
        <div className="sb"><div className="sv go">{data.players.length}</div><div className="sl">Pelaajaa</div></div>
        <div className="sb"><div className="sv">{totalM}</div><div className="sl">Ottelua</div></div>
        <div className="sb"><div className="sv re">{unpaid}</div><div className="sl">Maksamatta</div></div>
      </div>
      <div className="card">
        <div className="ct">Sijoitukset · klikkaa profiiliin</div>
        {ranked.map((p,i)=>{
          const s=stats[p]||{}, pct=s.games?Math.round(s.wins/s.games*100):0;
          return(
            <div key={p} className="ri cl" onClick={()=>setSel(p)}>
              <div className="rn">{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
              <div style={{flex:1}}><div style={{fontWeight:500}}>{p}</div><div style={{fontSize:12,color:"var(--t2)"}}>{s.wins||0}V – {s.losses||0}H · {s.games||0} peliä</div></div>
              <Sparkline data={monthlyTrend(p,data.matches)}/>
              <div style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:15,color:"var(--gr)",marginLeft:8}}>{s.games?pct+"%":"–"}</div>
            </div>
          );
        })}
      </div>
      <div className="card">
        <div className="ct">Olutvelat – historiakooste</div>
        {[...data.players].sort((a,b)=>(allTime[b]?.debt||0)-(allTime[a]?.debt||0)).slice(0,5).map(p=>{
          const s=allTime[p]||{}, net=(s.received||0)-(s.debt||0);
          return(
            <div key={p} className="ri cl" onClick={()=>setSel(p)}>
              <div style={{flex:1,fontWeight:500}}>{p}</div>
              <span className="tag tr">-{s.debt||0} 🍺</span>
              <span style={{marginLeft:6,fontSize:13,fontWeight:600}} className={net>=0?"np":"nn"}>{net>=0?"+":""}{net}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Profile ───────────────────────────────────────────────────────────────────
function Profile({player,data,stats,onBack}){
  const s=stats[player]||{}, pct=s.games?Math.round(s.wins/s.games*100):0;
  const rank=rankPlayers(data.players,stats).indexOf(player)+1;
  const trend=monthlyTrend(player,data.matches);
  const psts=Object.entries(partnerStats(player,data.matches)).filter(([,v])=>v.games>0).sort((a,b)=>(b[1].wins/b[1].games)-(a[1].wins/a[1].games));
  const osts=Object.entries(oppStats(player,data.matches)).filter(([,v])=>v.games>0).sort((a,b)=>(b[1].wins/b[1].games)-(a[1].wins/a[1].games));
  const recent=data.matches.filter(m=>m.winner&&[m.a1,m.a2,m.b1,m.b2].includes(player)).sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,5);
  return(
    <div>
      <button onClick={onBack} style={{background:"none",border:"none",color:"var(--t2)",cursor:"pointer",display:"flex",alignItems:"center",gap:6,marginBottom:14,fontSize:14}}>
        <Icon n="back" size={18}/> Takaisin
      </button>
      <div className="ph">
        <div className="pav">{player[0].toUpperCase()}</div>
        <div><div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:20}}>{player}</div><div style={{fontSize:12,color:"var(--t2)"}}>Sija {rank} · {s.wins||0}V {s.losses||0}H</div></div>
        <div style={{marginLeft:"auto",textAlign:"right"}}>
          <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:28,color:pct>=50?"var(--gr)":"var(--re)"}}>{s.games?pct+"%":"–"}</div>
          <div style={{fontSize:11,color:"var(--t2)"}}>voitto-%</div>
        </div>
      </div>
      <div className="sg"><div className="sb"><div className="sv">{s.games||0}</div><div className="sl">Pelit</div></div><div className="sb"><div className="sv gr">{s.wins||0}</div><div className="sl">Voitot</div></div><div className="sb"><div className="sv re">{s.losses||0}</div><div className="sl">Häviöt</div></div></div>
      <div className="card">
        <div className="ct">Kuukausitrendit</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",gap:4}}>
          {trend.map((mo,i)=>{
            const pm=mo.games>0?mo.wins/mo.games:null, bH=pm!==null?Math.max(4,Math.round(pm*56)):4;
            return(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                {mo.games>0&&<div style={{fontSize:10,color:"var(--t2)",fontWeight:600}}>{mo.wins}/{mo.games}</div>}
                <div style={{width:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:60}}>
                  <div style={{width:"70%",height:bH,background:!mo.games?"var(--sf2)":pm>=0.5?"var(--gr)":"var(--re)",borderRadius:3,opacity:mo.games?1:0.3}}/>
                </div>
                <div style={{fontSize:9,color:"var(--t3)",textTransform:"uppercase"}}>{mo.label}</div>
              </div>
            );
          })}
        </div>
      </div>
      {psts.length>0&&<div className="card"><div className="ct">Paritilastot</div>{psts.map(([pt,v])=>{const p2=Math.round(v.wins/v.games*100);return <div key={pt} className="dr"><div className="dn">{pt}</div><div className="dbw"><div className="dbb" style={{width:p2+"%"}}/></div><div className="dp" style={{color:p2>=50?"var(--gr)":"var(--re)"}}>{p2}%</div><div className="dg">{v.wins}V/{v.games}</div></div>;})}</div>}
      {osts.length>0&&<div className="card"><div className="ct">Vastustajatilastot</div>{osts.map(([op,v])=>{const p2=Math.round(v.wins/v.games*100);return <div key={op} className="dr"><div className="dn">{op}</div><div className="dbw"><div className={`dbb ${p2<50?"re":""}`} style={{width:p2+"%"}}/></div><div className="dp" style={{color:p2>=50?"var(--gr)":"var(--re)"}}>{p2}%</div><div className="dg">{v.wins}V/{v.games}</div></div>;})}</div>}
      {recent.length>0&&<div className="card"><div className="ct">Viimeiset ottelut</div>{recent.map(m=>{const mt=[m.a1,m.a2].includes(player)?"A":"B",won=m.winner===mt,partner=(mt==="A"?[m.a1,m.a2]:[m.b1,m.b2]).find(p=>p!==player),ops=(mt==="A"?[m.b1,m.b2]:[m.a1,m.a2]).join(" & ");return <div key={m.id} className="dr"><div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}><span style={{color:"var(--t2)"}}>& {partner}</span> vs {ops}</div><div style={{fontSize:11,color:"var(--t3)"}}>{fmt(m.date)}{m.course?` · ⛳ ${m.course}`:""}</div></div><span className={`tag ${won?"tg":"tr"}`}>{won?"Voitto":"Häviö"}</span></div>;})}</div>}
    </div>
  );
}

// ── Match Form ────────────────────────────────────────────────────────────────
function MatchForm({init,players,onSave,onCancel,title,allCourses}){
  const [f,setF]=useState(init), [err,setErr]=useState("");
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  function submit(){
    if(!f.a1||!f.a2||!f.b1||!f.b2){setErr("Valitse kaikki pelaajat");return;}
    if(!f.winner){setErr("Valitse voittajapari");return;}
    if(new Set([f.a1,f.a2,f.b1,f.b2]).size<4){setErr("Sama pelaaja ei voi esiintyä kahdesti");return;}
    onSave(f);
  }
  return(
    <div className="card" style={{marginBottom:16}}>
      <div className="ct">{title}</div>
      <div className="fg"><label className="fl">Päivämäärä</label><input className="fi" type="date" value={f.date} onChange={e=>s("date",e.target.value)}/></div>
      <div className="fg">
        <label className="fl">Kenttä (valinnainen)</label>
        <input className="fi" type="text" placeholder="esim. Tali, Pickala..." value={f.course||""}
          onChange={e=>s("course",e.target.value)} maxLength={50} list="course-list"/>
        {allCourses&&allCourses.length>0&&(
          <datalist id="course-list">
            {allCourses.map(c=><option key={c} value={c}/>)}
          </datalist>
        )}
      </div>
      <div className="fg"><label className="fl">Pari A</label><div className="fg2">
        <select className="fi fs" value={f.a1} onChange={e=>s("a1",e.target.value)}><option value="">Pelaaja 1</option>{players.map(p=><option key={p} value={p}>{p}</option>)}</select>
        <select className="fi fs" value={f.a2} onChange={e=>s("a2",e.target.value)}><option value="">Pelaaja 2</option>{players.map(p=><option key={p} value={p}>{p}</option>)}</select>
      </div></div>
      <div className="fg"><label className="fl">Pari B</label><div className="fg2">
        <select className="fi fs" value={f.b1} onChange={e=>s("b1",e.target.value)}><option value="">Pelaaja 1</option>{players.map(p=><option key={p} value={p}>{p}</option>)}</select>
        <select className="fi fs" value={f.b2} onChange={e=>s("b2",e.target.value)}><option value="">Pelaaja 2</option>{players.map(p=><option key={p} value={p}>{p}</option>)}</select>
      </div></div>
      <div className="fg"><label className="fl">Voittaja</label>
        <div className="wt">
          <div className={`wo A ${f.winner==="A"?"on":""}`} onClick={()=>s("winner","A")}>Pari A{f.a1&&f.a2?<><br/><small>{f.a1} & {f.a2}</small></>:""}</div>
          <div className={`wo B ${f.winner==="B"?"on":""}`} onClick={()=>s("winner","B")}>Pari B{f.b1&&f.b2?<><br/><small>{f.b1} & {f.b2}</small></>:""}</div>
        </div>
      </div>
      {err&&<div style={{color:"var(--re)",fontSize:13,marginBottom:10}}>{err}</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <button className="btn bs" onClick={onCancel}><Icon n="x" size={15}/>Peruuta</button>
        <button className="btn bp" onClick={submit} disabled={players.length<4}><Icon n="check" size={15}/>Tallenna</button>
      </div>
      {players.length<4&&<div style={{color:"var(--t2)",fontSize:12,marginTop:8,textAlign:"center"}}>Lisää vähintään 4 pelaajaa ensin</div>}
    </div>
  );
}

// ── Tab: Matches ──────────────────────────────────────────────────────────────
function TabMatches({data,save,toast,readOnly}){
  const [showAdd,setShowAdd]=useState(false), [editId,setEditId]=useState(null);

  const add=f=>{save(d=>({...d,matches:[{id:uid(),...f},...d.matches]}));setShowAdd(false);toast("Ottelu lisätty ✓");};
  const upd=f=>{save(d=>({...d,matches:d.matches.map(m=>m.id===editId?{...m,...f}:m)}));setEditId(null);toast("Ottelu päivitetty ✓");};
  const del=id=>{save(d=>({...d,matches:d.matches.filter(m=>m.id!==id)}));toast("Poistettu");};
  const tog=(id,k)=>save(d=>({...d,matches:d.matches.map(m=>m.id===id?{...m,[k]:!m[k]}:m)}));
  const sorted=[...data.matches].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const allCourses=[...new Set(data.matches.map(m=>m.course).filter(Boolean))].sort();
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div className="sh" style={{marginBottom:0}}>Ottelut</div>
        {!readOnly&&<button className="btn bp" style={{width:"auto",padding:"8px 14px",fontSize:13}} onClick={()=>{setShowAdd(s=>!s);setEditId(null);}}>
          <Icon n={showAdd?"x":"plus"} size={16}/>{showAdd?"Peruuta":"Lisää"}
        </button>}
      </div>
      {showAdd&&<MatchForm init={empty} players={data.players} title="Uusi ottelu" onSave={add} onCancel={()=>setShowAdd(false)} allCourses={allCourses}/>}
      {!sorted.length?<div className="emp"><div className="ei"><Icon n="golf" size={40}/></div>Ei otteluja vielä</div>:
        sorted.map(m=>{
          if(editId===m.id) return <MatchForm key={m.id} init={{date:m.date,a1:m.a1,a2:m.a2,b1:m.b1,b2:m.b2,winner:m.winner,course:m.course||""}} players={data.players} title="Muokkaa" onSave={upd} onCancel={()=>setEditId(null)} allCourses={allCourses}/>;
          const b=beerInfo(m), wA=m.winner==="A";
          return(
            <div key={m.id} className="mi">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div>
                  <span className="md">{fmt(m.date)}</span>
                  {m.course&&<span style={{fontSize:11,color:"var(--t2)",marginLeft:6}}>⛳ {m.course}</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {m.winner&&<span className={`mwb ${m.winner}`}>Pari {m.winner} voitti</span>}
                  {!readOnly&&<>
                    <button style={{background:"none",border:"none",color:"var(--bl)",cursor:"pointer",padding:2}} onClick={()=>{setEditId(m.id);setShowAdd(false);}}><Icon n="edit" size={14}/></button>
                    <button style={{background:"none",border:"none",color:"var(--t3)",cursor:"pointer",padding:2}} onClick={()=>del(m.id)}><Icon n="trash" size={14}/></button>
                  </>}
                </div>
              </div>
              <div className="mts">
                <div className={`mt ${wA?"w":""}`}><div className="ml">Pari A</div><div className="mn">{m.a1}<br/>{m.a2}</div></div>
                <div className="vs">VS</div>
                <div className={`mt ${!wA&&m.winner?"w":""}`}><div className="ml">Pari B</div><div className="mn">{m.b1}<br/>{m.b2}</div></div>
              </div>
              {b&&<div className="br">
                <div className="brow"><div className="bt"><strong>{b.loser1}</strong>→ {b.h1}</div><button className={`bb ${m.paidH1?"pd":""}`} onClick={()=>tog(m.id,"paidH1")}><Icon n={m.paidH1?"check":"beer"} size={14}/></button></div>
                <div className="brow"><div className="bt"><strong>{b.loser2}</strong>→ {b.h2}</div><button className={`bb ${m.paidH2?"pd":""}`} onClick={()=>tog(m.id,"paidH2")}><Icon n={m.paidH2?"check":"beer"} size={14}/></button></div>
              </div>}
            </div>
          );
        })
      }
    </div>
  );
}

// ── Tab: Beers ────────────────────────────────────────────────────────────────
function TabBeers({data,save,stats,readOnly}){
  function markPaid(name){
    save(d=>({...d,matches:d.matches.map(m=>{const b=beerInfo(m);if(!b)return m;let u={...m};if(b.loser1===name&&!m.paidH1)u.paidH1=true;if(b.loser2===name&&!m.paidH2)u.paidH2=true;return u;})}));
  }
  const sorted=[...data.players].sort((a,b)=>(stats[b]?.debt||0)-(stats[a]?.debt||0));
  return(
    <div>
      <div className="sh">Olutvelat</div>
      <p style={{color:"var(--t2)",fontSize:13,marginTop:-10,marginBottom:16}}>Maksamattomat oluet kaudelta</p>
      {!data.players.length?<div className="emp"><div className="ei"><Icon n="beer" size={40}/></div>Ei pelaajia</div>:(
        <div className="card">
          <table className="bt2">
            <thead><tr><th>Pelaaja</th><th style={{textAlign:"center"}}>Velkaa</th><th style={{textAlign:"center"}}>Saanut</th><th style={{textAlign:"center"}}>Netto</th><th></th></tr></thead>
            <tbody>{sorted.map(p=>{
              const s=stats[p]||{},debt=s.debt||0,recv=s.received||0,net=recv-debt;
              return <tr key={p}>
                <td style={{fontWeight:500}}>{p}</td>
                <td style={{textAlign:"center"}}>{debt>0?<span className="db">-{debt} 🍺</span>:<span style={{color:"var(--t3)"}}>–</span>}</td>
                <td style={{textAlign:"center"}}>{recv>0?<span className="rb">+{recv} 🍺</span>:<span style={{color:"var(--t3)"}}>–</span>}</td>
                <td style={{textAlign:"center"}} className={net>0?"np":net<0?"nn":""}>{net===0?"–":(net>0?"+":"")+net}</td>
                <td>{!readOnly&&debt>0&&<button className="btn bs" style={{width:"auto",padding:"4px 10px",fontSize:12}} onClick={()=>markPaid(p)}><Icon n="check" size={12}/>Maksettu</button>}</td>
              </tr>;
            })}</tbody>
          </table>
        </div>
      )}
      {data.matches.filter(m=>m.winner&&(!m.paidH1||!m.paidH2)).length>0&&(
        <div>
          <div className="ct" style={{padding:"8px 0"}}>Maksamattomat ottelut</div>
          {data.matches.filter(m=>m.winner&&(!m.paidH1||!m.paidH2)).map(m=>{
            const b=beerInfo(m); if(!b) return null;
            return <div key={m.id} className="mi">
              <div className="md" style={{marginBottom:8}}>{fmt(m.date)} · Pari {m.winner} voitti</div>
              <div className="br" style={{marginTop:0,paddingTop:0,borderTop:"none"}}>
                {!m.paidH1&&<div className="brow"><div className="bt"><strong>{b.loser1}</strong>→ {b.h1}</div>{!readOnly&&<button className="bb" onClick={()=>save(d=>({...d,matches:d.matches.map(x=>x.id===m.id?{...x,paidH1:true}:x)}))}><Icon n="check" size={14}/></button>}</div>}
                {!m.paidH2&&<div className="brow"><div className="bt"><strong>{b.loser2}</strong>→ {b.h2}</div>{!readOnly&&<button className="bb" onClick={()=>save(d=>({...d,matches:d.matches.map(x=>x.id===m.id?{...x,paidH2:true}:x)}))}><Icon n="check" size={14}/></button>}</div>}
              </div>
            </div>;
          })}
        </div>
      )}
    </div>
  );
}

// ── Tab: Players ──────────────────────────────────────────────────────────────
function TabPlayers({data,save,toast,readOnly,activeId,allIds,onNew,onRename,onSetActive}){
  const [name,setName]=useState(""), [err,setErr]=useState("");
  const [showNew,setShowNew]=useState(false), [newId,setNewId]=useState(""), [newErr,setNewErr]=useState(""), [busy,setBusy]=useState(false);
  const [showRename,setShowRename]=useState(false), [renameTarget,setRenameTarget]=useState(""), [renameVal,setRenameVal]=useState(""), [renameErr,setRenameErr]=useState(""), [renameBusy,setRenameBusy]=useState(false);

  function add(){
    const n=name.trim();
    if(!n){setErr("Syötä nimi");return;}
    if(data.players.includes(n)){setErr("Pelaaja on jo listalla");return;}
    if(data.players.length>=10){setErr("Maksimi 10");return;}
    save(d=>({...d,players:[...d.players,n]}));setName("");setErr("");toast(`${n} lisätty ✓`);
  }
  function remove(p){
    if(data.matches.some(m=>[m.a1,m.a2,m.b1,m.b2].includes(p))){toast("Poista ensin pelaajan ottelut");return;}
    save(d=>({...d,players:d.players.filter(x=>x!==p)}));
  }
  async function startNew(){
    const id=newId.trim();
    if(!id){setNewErr("Anna kauden nimi");return;}
    if(allIds.includes(id)){setNewErr("Kausi on jo olemassa");return;}
    setBusy(true);
    await onNew(id);
    setBusy(false);setShowNew(false);setNewId("");setNewErr("");
  }
  function openRename(id){
    setRenameTarget(id);setRenameVal(id);setRenameErr("");setShowRename(true);setShowNew(false);
  }
  async function doRename(){
    const nv=renameVal.trim();
    if(!nv){setRenameErr("Anna nimi");return;}
    if(nv===renameTarget){setShowRename(false);return;}
    if(allIds.includes(nv)){setRenameErr("Kausi on jo olemassa");return;}
    setRenameBusy(true);
    await onRename(renameTarget,nv);
    setRenameBusy(false);setShowRename(false);setRenameTarget("");setRenameVal("");
  }

  return(
    <div>
      <div className="sh">Pelaajat</div>
      <div className="card" style={{borderColor:"var(--go)"}}>
        <div className="ct" style={{color:"var(--go)"}}>🏌️ Kausiarkisto</div>
        <div style={{fontSize:13,color:"var(--t2)",marginBottom:12}}>Aktiivinen: <strong style={{color:"var(--tx)"}}>{activeId}</strong></div>

        {/* Season list with rename and set-active buttons */}
        <div style={{marginBottom:12}}>
          {allIds.map(id=>(
            <div key={id} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 0",borderBottom:"1px solid var(--bd)"}}>
              <span style={{flex:1,fontSize:13,fontWeight:id===activeId?600:400,color:id===activeId?"var(--gr)":"var(--tx)"}}>
                {id}{id===activeId?" ★":""}
              </span>
              {id!==activeId&&(
                <button onClick={()=>onSetActive(id)}
                  style={{background:"none",border:"1px solid var(--gr)",borderRadius:6,color:"var(--gr)",fontSize:11,padding:"3px 8px",cursor:"pointer",whiteSpace:"nowrap"}}>
                  ★ Aktivoi
                </button>
              )}
              <button onClick={()=>openRename(id)}
                style={{background:"none",border:"1px solid var(--bd)",borderRadius:6,color:"var(--t2)",fontSize:11,padding:"3px 8px",cursor:"pointer"}}>
                Nimeä
              </button>
            </div>
          ))}
        </div>

        {/* Rename form */}
        {showRename&&(
          <div style={{background:"var(--sf2)",borderRadius:"var(--rs)",padding:12,marginBottom:12}}>
            <div className="fg">
              <label className="fl">Uusi nimi kaudelle "{renameTarget}"</label>
              <input className="fi" value={renameVal}
                onChange={e=>{setRenameVal(e.target.value);setRenameErr("");}}
                onKeyDown={e=>e.key==="Enter"&&doRename()} autoFocus/>
            </div>
            {renameErr&&<div style={{color:"var(--re)",fontSize:13,marginBottom:8}}>{renameErr}</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <button className="btn bs" onClick={()=>setShowRename(false)}>Peruuta</button>
              <button className="btn bp" onClick={doRename} disabled={renameBusy}>{renameBusy?"Nimetään…":"Tallenna"}</button>
            </div>
          </div>
        )}

        {/* New season button */}
        {!showNew&&!showRename&&(
          <button className="btn bs" style={{borderColor:"var(--go)",color:"var(--go)"}} onClick={()=>{setShowNew(true);setShowRename(false);}}>+ Aloita uusi kausi</button>
        )}
        {showNew&&(
          <div>
            <div className="fg">
              <label className="fl">Uuden kauden nimi</label>
              <input className="fi" placeholder="esim. Kesä 2025" value={newId} onChange={e=>{setNewId(e.target.value);setNewErr("");}} onKeyDown={e=>e.key==="Enter"&&startNew()} autoFocus/>
              <div style={{fontSize:11,color:"var(--t3)",marginTop:4}}>Pelaajat siirtyvät, ottelut nollataan</div>
            </div>
            {newErr&&<div style={{color:"var(--re)",fontSize:13,marginBottom:8}}>{newErr}</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <button className="btn bs" onClick={()=>{setShowNew(false);setNewId("");setNewErr("");}}>Peruuta</button>
              <button className="btn bp" style={{background:"var(--go)"}} onClick={startNew} disabled={busy}>{busy?"Luodaan…":"Aloita kausi"}</button>
            </div>
          </div>
        )}
      </div>

      {!readOnly&&<div className="card">
        <div className="ct">Lisää pelaaja ({data.players.length}/10)</div>
        <div style={{display:"flex",gap:8}}>
          <input className="fi" placeholder="Nimi..." value={name} onChange={e=>{setName(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&add()} maxLength={30}/>
          <button className="btn bp" style={{width:"auto",padding:"10px 16px"}} onClick={add} disabled={data.players.length>=10}><Icon n="plus" size={18}/></button>
        </div>
        {err&&<div style={{color:"var(--re)",fontSize:13,marginTop:8}}>{err}</div>}
      </div>}
      {!data.players.length?<div className="emp"><div className="ei"><Icon n="users" size={40}/></div>Ei pelaajia vielä</div>:(
        <div className="card">
          <div className="ct">Pelaajat tällä kaudella</div>
          {data.players.map(p=><div key={p} className="pc"><span style={{fontWeight:500}}>{p}</span>{!readOnly&&<button className="pd2" onClick={()=>remove(p)}><Icon n="x" size={16}/></button>}</div>)}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
